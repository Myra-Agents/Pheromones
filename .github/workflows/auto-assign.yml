name: Auto-assign PR

# Assigns every newly opened PR to the maintainer. Uses pull_request_target so
# it has write permission even for fork PRs; it only calls the issues API and
# never checks out PR code, so it's safe against untrusted contributions.
on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.assignees && pr.assignees.length) return; // respect explicit assignees
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: ['Gamma-Software'],
            });
